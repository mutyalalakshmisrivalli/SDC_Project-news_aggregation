spring.application.name=coreservices

#Server Port
server.port=8001

#Local H2 database configuration
#This keeps the project runnable without requiring a separate PostgreSQL server.
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:file:./data/news_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

#JPA Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
jwt.secret=myVeryLongSecretKeyForJwtTokenGeneration123456789
jwt.token-validity=86400000
